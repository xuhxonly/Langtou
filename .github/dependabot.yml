version: 2
updates:
  # Maven 依赖更新
  - package-ecosystem: maven
    directory: "/src/backend"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - java
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      spring-boot:
        patterns:
          - org.springframework.boot:*
          - org.springframework.cloud:*
      security:
        dependency-name: "*"
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor

  # npm 前端依赖更新
  - package-ecosystem: npm
    directory: "/src/frontend/web"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore
      include: scope
    groups:
      vue:
        patterns:
          - vue
          - vue-router
          - pinia
          - @vjs/*
      dev:
        dependency-name: vite
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch

  # npm 管理后台依赖更新
  - package-ecosystem: npm
    directory: "/src/frontend/admin"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - typescript
    commit-message:
      prefix: chore
      include: scope

  # pip Python 依赖更新
  - package-ecosystem: pip
    directory: "/src/recommendation"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions 更新
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
