name: Backend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Test Backend Services
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - { name: 'gateway', path: 'src/backend/langtou-gateway' }
          - { name: 'user-service', path: 'src/backend/langtou-user-service' }
          - { name: 'content-service', path: 'src/backend/langtou-content-service' }
          - { name: 'interact-service', path: 'src/backend/langtou-interact-service' }
          - { name: 'message-service', path: 'src/backend/langtou-message-service' }
          - { name: 'common', path: 'src/backend/langtou-common' }
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          mvn-file-path: 'src/backend/pom.xml'
      
      - name: Build and Test ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.path }}
        run: |
          mvn clean test -B \
            -Dmaven.test.failure.ignore=false \
            -Dsurefire.useFile=false
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service.name }}
          path: ${{ matrix.service.path }}/target/surefire-reports/*.xml
          if-no-files-found: ignore

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          mvn-file-path: 'src/backend/pom.xml'
      
      - name: Run Checkstyle
        working-directory: src/backend
        run: mvn checkstyle:check -B
        continue-on-error: true
