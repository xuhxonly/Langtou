name: CD - Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'infrastructure/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service:
          - { name: 'gateway', dockerfile: 'src/backend/langtou-gateway/Dockerfile', port: '8080' }
          - { name: 'user-service', dockerfile: 'src/backend/langtou-user-service/Dockerfile', port: '8081' }
          - { name: 'content-service', dockerfile: 'src/backend/langtou-content-service/Dockerfile', port: '8082' }
          - { name: 'recommendation', dockerfile: 'src/recommendation/Dockerfile', port: '8000' }
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long
      
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Trigger deployment (staging)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/langtou
            docker compose pull ${{ matrix.service.name }}
            docker compose up -d ${{ matrix.service.name }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    
    steps:
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
