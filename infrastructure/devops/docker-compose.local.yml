version: "3.9"

networks:
  langtou-local-network:
    driver: bridge

volumes:
  mysql-local-data:
  redis-local-data:

services:
  langtou-mysql:
    image: mysql:8.0
    container_name: langtou-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: langtou
      MYSQL_USER: langtou
      MYSQL_PASSWORD: langtou123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql
    networks:
      - langtou-local-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=256M
      --max-connections=200

  langtou-redis:
    image: redis:7-alpine
    container_name: langtou-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-local-data:/data
    networks:
      - langtou-local-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
