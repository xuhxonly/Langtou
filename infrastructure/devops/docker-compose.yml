# ==========================================
# Langtou 社交内容社区 APP - Docker Compose 生产环境配置
# ==========================================
# 包含: MySQL 8.0 (主从), Redis Cluster (6节点), Zookeeper + Kafka,
#       Elasticsearch + Kibana, Nacos, 所有后端微服务, Python推荐服务,
#       Nginx, Prometheus + Grafana
# ==========================================

version: "3.9"

networks:
  langtou-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-master-data:
  mysql-slave-data:
  es-data:
  nacos-data:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  kafka-data:
  zookeeper-data:
  nginx-data:
  minio-data:
  loki-data:

services:
  # ==========================================
  # MySQL 8.0 (主从架构)
  # ==========================================
  langtou-mysql:
    image: mysql:8.0
    container_name: langtou-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./scripts/mysql-master.cnf:/etc/mysql/conf.d/master.cnf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-do-db=${MYSQL_DATABASE}
      --binlog-do-db=nacos
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=512M

  langtou-mysql-slave:
    image: mysql:8.0
    container_name: langtou-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./scripts/mysql-slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.11
    depends_on:
      langtou-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=512M

  # ==========================================
  # Redis Standalone (单节点模式，与推荐服务 redis.Redis() 客户端兼容)
  # ==========================================
  langtou-redis:
    image: redis:7-alpine
    container_name: langtou-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      langtou-network:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  # ==========================================
  # Zookeeper
  # ==========================================
  langtou-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: langtou-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.30
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Kafka
  # ==========================================
  langtou-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: langtou-kafka
    restart: always
    depends_on:
      langtou-zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.31
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Elasticsearch
  # ==========================================
  langtou-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: langtou-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - TZ=${TZ}
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q 'status'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==========================================
  # Kibana
  # ==========================================
  langtou-kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: langtou-kibana
    restart: always
    depends_on:
      langtou-elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://langtou-elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - TZ=${TZ}
    ports:
      - "5601:5601"
    networks:
      langtou-network:
        ipv4_address: 172.20.0.41
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # Nacos (注册中心/配置中心)
  # ==========================================
  langtou-nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: langtou-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: ip
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: langtou-mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      TZ: ${TZ}
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.50
    depends_on:
      langtou-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================
  # Nginx (反向代理/负载均衡)
  # ==========================================
  langtou-nginx:
    image: nginx:1.25-alpine
    container_name: langtou-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/h5.conf:/etc/nginx/conf.d/h5.conf:ro
      - nginx-data:/var/cache/nginx
    networks:
      langtou-network:
        ipv4_address: 172.20.0.70
    depends_on:
      langtou-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # 后端微服务
  # ==========================================
  langtou-gateway:
    image: ${DOCKER_REGISTRY:-docker.io.local}/${DOCKER_NAMESPACE:-langtou}/gateway:${IMAGE_TAG:-latest}
    container_name: langtou-gateway
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${GATEWAY_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-nacos:
        condition: service_started
      langtou-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-user-service:
    image: ${DOCKER_REGISTRY:-docker.io.local}/${DOCKER_NAMESPACE:-langtou}/user-service:${IMAGE_TAG:-latest}
    container_name: langtou-user-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${USER_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-content-service:
    image: ${DOCKER_REGISTRY:-docker.io.local}/${DOCKER_NAMESPACE:-langtou}/content-service:${IMAGE_TAG:-latest}
    container_name: langtou-content-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ES_HOST=langtou-elasticsearch
      - ES_PORT=9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${CONTENT_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-elasticsearch:
        condition: service_healthy
      langtou-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-interact-service:
    image: ${DOCKER_REGISTRY:-docker.io.local}/${DOCKER_NAMESPACE:-langtou}/interact-service:${IMAGE_TAG:-latest}
    container_name: langtou-interact-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka:9092
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${INTERACT_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-kafka:
        condition: service_healthy
      langtou-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-message-service:
    image: ${DOCKER_REGISTRY:-docker.io.local}/${DOCKER_NAMESPACE:-langtou}/message-service:${IMAGE_TAG:-latest}
    container_name: langtou-message-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka:9092
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${MESSAGE_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-kafka:
        condition: service_healthy
      langtou-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ==========================================
  # Python 推荐服务
  # ==========================================
  langtou-recommendation-service:
    image: ${DOCKER_REGISTRY:-docker.io.local}/${DOCKER_NAMESPACE:-langtou}/recommendation-service:${IMAGE_TAG:-latest}
    container_name: langtou-recommendation-service
    restart: always
    environment:
      - REDIS_HOST=langtou-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka:9092
      - KAFKA_TOPIC_EVENTS=user_events
      - ES_HOST=langtou-elasticsearch
      - ES_PORT=9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - TZ=${TZ}
    ports:
      - "${RECOMMENDATION_PORT:-8000}:8000"
    networks:
      - langtou-network
    depends_on:
      langtou-elasticsearch:
        condition: service_healthy
      langtou-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ==========================================
  # Prometheus
  # ==========================================
  langtou-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: langtou-prometheus
    restart: always
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/rules/alert-rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      langtou-network:
        ipv4_address: 172.20.0.60
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Grafana
  # ==========================================
  langtou-grafana:
    image: grafana/grafana:10.2.0
    container_name: langtou-grafana
    restart: always
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - TZ=${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/langtou-dashboard.json:ro
      - ./monitoring/grafana-log-dashboard.json:/var/lib/grafana/dashboards/langtou-log-dashboard.json:ro
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.61
    depends_on:
      langtou-prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # Loki (日志聚合)
  # ==========================================
  langtou-loki:
    image: grafana/loki:2.9.0
    container_name: langtou-loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    networks:
      langtou-network:
        ipv4_address: 172.20.0.62
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # Promtail (日志收集)
  # ==========================================
  langtou-promtail:
    image: grafana/promtail:2.9.0
    container_name: langtou-promtail
    restart: always
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - langtou-network
    depends_on:
      langtou-loki:
        condition: service_healthy
    command: -config.file=/etc/promtail/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # MinIO (对象存储)
  # ==========================================
  langtou-minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: langtou-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      TZ: ${TZ}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.80
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # Alertmanager (告警管理)
  # ==========================================
  langtou-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: langtou-alertmanager
    restart: always
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      langtou-network:
        ipv4_address: 172.20.0.63
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Exporters (监控指标采集)
  # ==========================================
  langtou-mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: langtou-mysql-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "${MYSQL_USER}:${MYSQL_PASSWORD}@(langtou-mysql:3306)/${MYSQL_DATABASE}"
      TZ: ${TZ}
    ports:
      - "9104:9104"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy

  langtou-redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: langtou-redis-exporter
    restart: always
    environment:
      REDIS_ADDR: "redis://langtou-redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      TZ: ${TZ}
    ports:
      - "9121:9121"
    networks:
      - langtou-network
    depends_on:
      langtou-redis:
        condition: service_healthy

  langtou-node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: langtou-node-exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - langtou-network
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($|/)'
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

