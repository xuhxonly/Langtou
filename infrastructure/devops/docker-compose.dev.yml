# ==========================================
# Langtou 社交内容社区 APP - Docker Compose 测试环境配置
# ==========================================
# 用途: CI/CD API集成测试专用
# 包含: MySQL (单实例), Redis (单实例), Kafka (单节点), Elasticsearch,
#       Nacos (嵌入式), MinIO, 所有后端微服务 (test profile)
# 不包含: 监控服务, 推荐服务, Nginx
# ==========================================
# 使用方式:
#   docker compose -f docker-compose.dev.yml --env-file .env up -d
#   docker compose -f docker-compose.dev.yml --env-file .env down -v
# ==========================================

version: "3.9"

networks:
  langtou-test-network:
    driver: bridge

volumes:
  mysql-test-data:
  redis-test-data:
  es-test-data:
  nacos-test-data:
  kafka-test-data:
  zookeeper-test-data:
  minio-test-data:

services:
  # ==========================================
  # MySQL 8.0 (单实例, 测试数据库)
  # ==========================================
  langtou-mysql-dev:
    image: mysql:8.0
    container_name: langtou-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3306:3306"
    volumes:
      - mysql-test-data:/var/lib/mysql
      - ../langtou-database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../langtou-database/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    networks:
      - langtou-test-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=256M
      --max-connections=200

  # ==========================================
  # Redis (单实例)
  # ==========================================
  langtou-redis-dev:
    image: redis:7-alpine
    container_name: langtou-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-test-data:/data
    networks:
      - langtou-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ==========================================
  # Zookeeper (测试版)
  # ==========================================
  langtou-zookeeper-dev:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: langtou-zookeeper-dev
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-test-data:/var/lib/zookeeper/data
    networks:
      - langtou-test-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Kafka (单节点)
  # ==========================================
  langtou-kafka-dev:
    image: confluentinc/cp-kafka:7.5.0
    container_name: langtou-kafka-dev
    restart: unless-stopped
    depends_on:
      langtou-zookeeper-dev:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: langtou-zookeeper-dev:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://langtou-kafka-dev:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 10485760
    ports:
      - "9092:9092"
    volumes:
      - kafka-test-data:/var/lib/kafka/data
    networks:
      - langtou-test-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Elasticsearch (单节点, 测试环境关闭安全)
  # ==========================================
  langtou-elasticsearch-dev:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: langtou-elasticsearch-dev
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=${TZ}
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-test-data:/usr/share/elasticsearch/data
    networks:
      - langtou-test-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ==========================================
  # Nacos (测试版, 使用嵌入式数据库, 关闭认证)
  # ==========================================
  langtou-nacos-dev:
    image: nacos/nacos-server:v2.3.0
    container_name: langtou-nacos-dev
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      TZ: ${TZ}
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-test-data:/home/nacos/data
    networks:
      - langtou-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==========================================
  # MinIO (对象存储, 测试版)
  # ==========================================
  langtou-minio-dev:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: langtou-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      TZ: ${TZ}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-test-data:/data
    networks:
      - langtou-test-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================
  # 后端微服务 (使用 test profile 启动)
  # ==========================================
  langtou-user-service-dev:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/user-service:${IMAGE_TAG}
    container_name: langtou-user-service-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - NACOS_SERVER_ADDR=langtou-nacos-dev:8848
      - MYSQL_HOST=langtou-mysql-dev
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-dev
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JVM_OPTS=-Xms128m -Xmx256m -XX:+UseG1GC
      - TZ=${TZ}
    ports:
      - "${USER_SERVICE_PORT:-8081}:8080"
    networks:
      - langtou-test-network
    depends_on:
      langtou-mysql-dev:
        condition: service_healthy
      langtou-nacos-dev:
        condition: service_healthy
      langtou-redis-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  langtou-content-service-dev:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/content-service:${IMAGE_TAG}
    container_name: langtou-content-service-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - NACOS_SERVER_ADDR=langtou-nacos-dev:8848
      - MYSQL_HOST=langtou-mysql-dev
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-dev
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ES_HOST=langtou-elasticsearch-dev
      - ES_PORT=9200
      - MINIO_ENDPOINT=http://langtou-minio-dev:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - JVM_OPTS=-Xms128m -Xmx256m -XX:+UseG1GC
      - TZ=${TZ}
    ports:
      - "${CONTENT_SERVICE_PORT:-8082}:8080"
    networks:
      - langtou-test-network
    depends_on:
      langtou-mysql-dev:
        condition: service_healthy
      langtou-nacos-dev:
        condition: service_healthy
      langtou-elasticsearch-dev:
        condition: service_healthy
      langtou-redis-dev:
        condition: service_healthy
      langtou-minio-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  langtou-interact-service-dev:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/interact-service:${IMAGE_TAG}
    container_name: langtou-interact-service-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - NACOS_SERVER_ADDR=langtou-nacos-dev:8848
      - MYSQL_HOST=langtou-mysql-dev
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-dev
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka-dev:9092
      - JVM_OPTS=-Xms128m -Xmx256m -XX:+UseG1GC
      - TZ=${TZ}
    ports:
      - "${INTERACT_SERVICE_PORT:-8083}:8080"
    networks:
      - langtou-test-network
    depends_on:
      langtou-mysql-dev:
        condition: service_healthy
      langtou-nacos-dev:
        condition: service_healthy
      langtou-kafka-dev:
        condition: service_healthy
      langtou-redis-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  langtou-message-service-dev:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/message-service:${IMAGE_TAG}
    container_name: langtou-message-service-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - NACOS_SERVER_ADDR=langtou-nacos-dev:8848
      - MYSQL_HOST=langtou-mysql-dev
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-dev
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka-dev:9092
      - JVM_OPTS=-Xms128m -Xmx256m -XX:+UseG1GC
      - TZ=${TZ}
    ports:
      - "${MESSAGE_SERVICE_PORT:-8084}:8080"
    networks:
      - langtou-test-network
    depends_on:
      langtou-mysql-dev:
        condition: service_healthy
      langtou-nacos-dev:
        condition: service_healthy
      langtou-kafka-dev:
        condition: service_healthy
      langtou-redis-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  langtou-gateway-dev:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/gateway:${IMAGE_TAG}
    container_name: langtou-gateway-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - NACOS_SERVER_ADDR=langtou-nacos-dev:8848
      - JVM_OPTS=-Xms128m -Xmx256m -XX:+UseG1GC
      - TZ=${TZ}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - langtou-test-network
    depends_on:
      langtou-nacos-dev:
        condition: service_healthy
      langtou-redis-dev:
        condition: service_healthy
      langtou-user-service-dev:
        condition: service_healthy
      langtou-content-service-dev:
        condition: service_healthy
      langtou-interact-service-dev:
        condition: service_healthy
      langtou-message-service-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

