# ==========================================
# Langtou - CDN 配置
# 静态资源CDN回源、图片/视频加速、缓存策略、跨域配置
# ==========================================

# CDN回源配置 - 定义CDN回源的上游
upstream cdn_origin {
    server 127.0.0.1:80;  # 本地Nginx作为回源
    keepalive 64;
}

# ==========================================
# CDN缓存路径配置
# ==========================================

# 图片CDN加速 - 缓存1年
location /cdn/images/ {
    alias /usr/share/nginx/html/media/images/;
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header X-Content-Type-Options "nosniff";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization";
    access_log off;

    # 启用gzip压缩
    gzip_static on;

    # 图片防盗链 (仅允许指定域名引用)
    valid_referers none blocked server_names
        *.langtou.com
        langtou.com
        *.langtou.cn
        langtou.cn;

    if ($invalid_referer) {
        return 403;
    }

    # 支持 WebP 自动转换 (如果浏览器支持)
    # map $http_accept $webp_suffix { default ""; "~*webp" ".webp"; }
}

# 视频CDN加速 - 缓存1年
location /cdn/videos/ {
    alias /usr/share/nginx/html/media/videos/;
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header X-Content-Type-Options "nosniff";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    add_header Access-Control-Allow-Headers "Range";
    add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range";
    access_log off;

    # 视频防盗链
    valid_referers none blocked server_names
        *.langtou.com
        langtou.com
        *.langtou.cn
        langtou.cn;

    if ($invalid_referer) {
        return 403;
    }

    # 支持断点续传
    add_header Accept-Ranges bytes;

    # 大文件分块传输
    proxy_max_temp_file_size 2048m;
    output_buffers 2 1m;
}

# JS/CSS CDN加速 - 缓存30天
location /cdn/assets/ {
    alias /usr/share/nginx/html/static/assets/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header X-Content-Type-Options "nosniff";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
    access_log off;

    # 启用gzip/brotli预压缩
    gzip_static on;
    # brotli_static on;

    # SRI (Subresource Integrity) 友好
    add_header Vary "Accept-Encoding";
}

# 字体文件CDN加速 - 缓存1年
location /cdn/fonts/ {
    alias /usr/share/nginx/html/static/fonts/;
    expires 365d;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
    access_log off;
    add_header Vary "Accept-Encoding";
}

# ==========================================
# CDN跨域(CORS)配置
# ==========================================

# CORS预检请求处理
location /cdn/ {
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Range, X-Requested-With";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Length 0;
        return 204;
    }
}

# ==========================================
# CDN回源配置 (当CDN未命中时回源到源站)
# ==========================================

# CDN回源 - 静态资源
location /origin/static/ {
    internal;  # 仅允许内部回源访问
    alias /usr/share/nginx/html/static/;

    # 回源时不设置长缓存 (由CDN边缘节点控制缓存)
    expires 5m;
    add_header Cache-Control "public, max-age=300, s-maxage=31536000";
    add_header X-Cache-Origin "langtou-origin";

    # 源站日志 (用于排查CDN回源问题)
    access_log /var/log/nginx/cdn_origin_access.log main;
}

# CDN回源 - 媒体资源
location /origin/media/ {
    internal;
    alias /usr/share/nginx/html/media/;

    expires 5m;
    add_header Cache-Control "public, max-age=300, s-maxage=31536000";
    add_header X-Cache-Origin "langtou-origin";

    access_log /var/log/nginx/cdn_origin_access.log main;
}

# ==========================================
# CDN缓存状态检查 (用于运维监控)
# ==========================================
location /cdn-status {
    access_log off;
    return 200 "cdn_origin_active";
    add_header Content-Type text/plain;

    # 仅允许内网访问
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
}
