# ====================================================================================
# WARNING: 此文件包含 Secret 占位符，不应提交真实的 Base64 编码密码到公开仓库！
# 生产环境请使用以下方式之一管理 Secret：
#   1. kubectl create secret 命令动态创建
#   2. sealed-secrets (https://github.com/bitnami-labs/sealed-secrets)
#   3. external-secrets (https://external-secrets.io/)
#   4. HashiCorp Vault
#
# 动态创建 Secret 示例：
#   kubectl create secret generic langtou-db-secret \
#     --from-literal=mysql-root-password='<YOUR_PASSWORD>' \
#     --from-literal=mysql-user='<YOUR_USER>' \
#     --from-literal=mysql-password='<YOUR_PASSWORD>' \
#     --namespace=langtou
# ====================================================================================
# ==========================================
# Langtou 社交内容社区 APP - Secret (敏感信息占位符)
# ==========================================

---
apiVersion: v1
kind: Secret
metadata:
  name: langtou-db-secret
  namespace: langtou
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  mysql-root-password: <BASE64_ENCODED_PASSWORD>
  mysql-user: <BASE64_ENCODED_USER>
  mysql-password: <BASE64_ENCODED_PASSWORD>

---
apiVersion: v1
kind: Secret
metadata:
  name: langtou-redis-secret
  namespace: langtou
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  redis-password: <BASE64_ENCODED_PASSWORD>

---
apiVersion: v1
kind: Secret
metadata:
  name: langtou-es-secret
  namespace: langtou
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  es-username: <BASE64_ENCODED_USERNAME>
  es-password: <BASE64_ENCODED_PASSWORD>

---
apiVersion: v1
kind: Secret
metadata:
  name: langtou-nacos-secret
  namespace: langtou
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  nacos-auth-token: <BASE64_ENCODED_TOKEN>
  nacos-identity-key: <BASE64_ENCODED_KEY>
  nacos-identity-value: <BASE64_ENCODED_VALUE>

---
apiVersion: v1
kind: Secret
metadata:
  name: langtou-jwt-secret
  namespace: langtou
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  jwt-secret: <BASE64_ENCODED_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: langtou-docker-registry
  namespace: langtou
type: kubernetes.io/dockerconfigjson
data:
  # 请替换为实际的 docker registry 认证信息
  # kubectl create secret docker-registry langtou-docker-registry \
  #   --docker-server=docker.io.local \
  #   --docker-username=admin \
  #   --docker-password=<PASSWORD> \
  #   --docker-email=devops@langtou.com \
  #   --namespace=langtou
  .dockerconfigjson: <BASE64_ENCODED_DOCKERCONFIG>
