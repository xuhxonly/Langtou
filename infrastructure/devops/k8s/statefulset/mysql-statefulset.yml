# ==========================================
# Langtou 社交内容社区 APP - MySQL 8.0 StatefulSet
# ==========================================
# 部署在 langtou-infra 命名空间
# 包含: Headless Service + StatefulSet + PVC + 初始化脚本ConfigMap
# ==========================================

---
# MySQL Headless Service (用于StatefulSet稳定的网络标识)
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: langtou-infra
  labels:
    app: mysql
    tier: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless Service
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
    - port: 33060
      targetPort: 33060
      name: mysqlx

---
# MySQL 主从复制用的只读Service
apiVersion: v1
kind: Service
metadata:
  name: mysql-read
  namespace: langtou-infra
  labels:
    app: mysql
    tier: database
    role: read
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql

---
# MySQL 初始化脚本 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: langtou-infra
  labels:
    app: mysql
    tier: database
data:
  init.sql: |
    -- 创建业务数据库
    CREATE DATABASE IF NOT EXISTS langtou CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS nacos CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    
    -- 创建业务用户
    CREATE USER IF NOT EXISTS 'langtou'@'%' IDENTIFIED BY 'Langtou@Db2024';
    GRANT ALL PRIVILEGES ON langtou.* TO 'langtou'@'%';
    GRANT ALL PRIVILEGES ON nacos.* TO 'langtou'@'%';
    FLUSH PRIVILEGES;
    
    -- 创建复制用户
    CREATE USER IF NOT EXISTS 'repl'@'%' IDENTIFIED BY 'Langtou@Repl2024';
    GRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';
    FLUSH PRIVILEGES;

  master.cnf: |
    [mysqld]
    server-id=1
    log-bin=mysql-bin
    binlog-do-db=langtou
    binlog-do-db=nacos
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    default-authentication-plugin=mysql_native_password
    innodb_buffer_pool_size=512M
    innodb_log_file_size=128M
    innodb_flush_log_at_trx_commit=1
    sync_binlog=1
    max_connections=500
    wait_timeout=28800
    interactive_timeout=28800
    
    # 性能优化
    query_cache_type=1
    query_cache_size=64M
    tmp_table_size=64M
    max_heap_table_size=64M
    
    # 慢查询日志
    slow_query_log=1
    slow_query_log_file=/var/lib/mysql/slow.log
    long_query_time=2

---
# MySQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: langtou-infra
  labels:
    app: mysql
    tier: database
spec:
  serviceName: mysql
  replicas: 2  # 1主1从
  selector:
    matchLabels:
      app: mysql
      tier: database
  template:
    metadata:
      labels:
        app: mysql
        tier: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9104"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mysql-sa
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql
            - containerPort: 33060
              name: mysqlx
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "langtou"
            - name: MYSQL_USER
              value: "langtou"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
            - name: TZ
              value: "Asia/Shanghai"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -p${MYSQL_ROOT_PASSWORD}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -p${MYSQL_ROOT_PASSWORD}
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-config
              mountPath: /etc/mysql/conf.d
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-config
          configMap:
            name: mysql-init-scripts
            items:
              - key: master.cnf
                path: master.cnf
        - name: mysql-init
          configMap:
            name: mysql-init-scripts
            items:
              - key: init.sql
                path: init.sql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app: mysql
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard  # 根据集群StorageClass调整
        resources:
          requests:
            storage: 20Gi

---
# MySQL Secret (生产环境请使用 sealed-secrets 或 external-secrets)
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: langtou-infra
  labels:
    app: mysql
    tier: database
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  # kubectl create secret generic mysql-secret \
  #   --from-literal=mysql-root-password='<YOUR_PASSWORD>' \
  #   --from-literal=mysql-password='<YOUR_PASSWORD>' \
  #   --from-literal=mysql-repl-password='<YOUR_PASSWORD>' \
  #   --namespace=langtou-infra
  mysql-root-password: <BASE64_ENCODED_PASSWORD>
  mysql-password: <BASE64_ENCODED_PASSWORD>
  mysql-repl-password: <BASE64_ENCODED_PASSWORD>
