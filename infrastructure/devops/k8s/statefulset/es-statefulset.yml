# ==========================================
# Langtou 社交内容社区 APP - Elasticsearch StatefulSet
# ==========================================
# 部署在 langtou-infra 命名空间
# 3节点 Elasticsearch 集群
# ==========================================

---
# Elasticsearch Headless Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: langtou-infra
  labels:
    app: elasticsearch
    tier: search
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
      name: http
    - port: 9300
      targetPort: 9300
      name: transport

---
# Elasticsearch 外部访问 Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-external
  namespace: langtou-infra
  labels:
    app: elasticsearch
    tier: search
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
      name: http

---
# Elasticsearch 配置文件 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-config
  namespace: langtou-infra
  labels:
    app: elasticsearch
    tier: search
data:
  elasticsearch.yml: |
    cluster:
      name: langtou-es
      routing:
        allocation:
          awareness:
            attributes: k8s_node_name
    node:
      master: true
      data: true
      ingest: true
    path:
      data: /usr/share/elasticsearch/data
      logs: /usr/share/elasticsearch/logs
    bootstrap:
      memory_lock: false
    network:
      host: 0.0.0.0
    discovery:
      seed_hosts:
        - elasticsearch-0.elasticsearch
        - elasticsearch-1.elasticsearch
        - elasticsearch-2.elasticsearch
      seed_providers: file
    cluster:
      initial_master_nodes:
        - elasticsearch-0
        - elasticsearch-1
        - elasticsearch-2
    xpack:
      security:
        enabled: true
        transport:
          ssl:
            enabled: false
      monitoring:
        collection:
          enabled: true
      ml:
        enabled: false
    http:
      cors:
        enabled: true
        allow-origin: "https://kibana.langtou.com"
      max_content_length: 500mb

  jvm.options: |
    -Xms1g
    -Xmx1g
    -XX:+UseG1GC
    -XX:MaxGCPauseMillis=200
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/usr/share/elasticsearch/logs

---
# Elasticsearch StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: langtou-infra
  labels:
    app: elasticsearch
    tier: search
spec:
  serviceName: elasticsearch
  replicas: 3
  selector:
    matchLabels:
      app: elasticsearch
      tier: search
  template:
    metadata:
      labels:
        app: elasticsearch
        tier: search
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9200"
        prometheus.io/path: "/_prometheus/metrics"
    spec:
      serviceAccountName: elasticsearch-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - elasticsearch
                topologyKey: kubernetes.io/hostname
      initContainers:
        # 设置 vm.max_map_count
        - name: sysctl
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              sysctl -w vm.max_map_count=262144 || true
          securityContext:
            privileged: true
        # 修改目录权限
        - name: fix-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              chown -R 1000:1000 /usr/share/elasticsearch/data
              chown -R 1000:1000 /usr/share/elasticsearch/logs
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
            - name: es-logs
              mountPath: /usr/share/elasticsearch/logs
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: cluster.name
              value: "langtou-es"
            - name: discovery.seed_hosts
              value: "elasticsearch-0.elasticsearch,elasticsearch-1.elasticsearch,elasticsearch-2.elasticsearch"
            - name: cluster.initial_master_nodes
              value: "elasticsearch-0,elasticsearch-1,elasticsearch-2"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: elastic-password
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.security.transport.ssl.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: bootstrap.memory_lock
              value: "false"
            - name: TZ
              value: "Asia/Shanghai"
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q 'status'
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q 'status'
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
            - name: es-logs
              mountPath: /usr/share/elasticsearch/logs
            - name: es-config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: es-config
              mountPath: /usr/share/elasticsearch/config/jvm.options.d/custom.options
              subPath: jvm.options
      volumes:
        - name: es-config
          configMap:
            name: elasticsearch-config
  volumeClaimTemplates:
    - metadata:
        name: es-data
        labels:
          app: elasticsearch
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: es-logs
        labels:
          app: elasticsearch
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
# Elasticsearch Secret
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-secret
  namespace: langtou-infra
  labels:
    app: elasticsearch
    tier: search
type: Opaque
data:
  # 请通过 kubectl create secret 动态创建，以下为占位符
  # kubectl create secret generic elasticsearch-secret \
  #   --from-literal=elastic-username='<YOUR_USERNAME>' \
  #   --from-literal=elastic-password='<YOUR_PASSWORD>' \
  #   --namespace=langtou-infra
  elastic-username: <BASE64_ENCODED_USERNAME>
  elastic-password: <BASE64_ENCODED_PASSWORD>

---
# Kibana Deployment (配合Elasticsearch使用)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: langtou-infra
  labels:
    app: kibana
    tier: search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
      tier: search
  template:
    metadata:
      labels:
        app: kibana
        tier: search
    spec:
      serviceAccountName: elasticsearch-sa
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch:9200"
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: elastic-username
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: elastic-password
            - name: TZ
              value: "Asia/Shanghai"
            - name: SERVER_BASEPATH
              value: ""
            - name: MONITORING_UI_CONTAINER_ELASTICSEARCH_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
# Kibana Service
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: langtou-infra
  labels:
    app: kibana
    tier: search
spec:
  type: ClusterIP
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
      name: http
