# ============================================================
# Flyway 配置文件 - 榔头(Langtou)社交内容社区APP
# ============================================================

# 数据库连接配置
flyway.url=jdbc:mysql://localhost:3306/langtou?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
flyway.user=root
flyway.password=your_password

# 迁移脚本配置
flyway.locations=filesystem:flyway/migrations
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# 版本控制配置
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.validateOnMigrate=true
flyway.cleanOnValidationError=false

# 性能配置
flyway.connectRetries=10
flyway.connectRetriesInterval=10

# 日志配置
flyway.loggers=auto

# 编码配置
flyway.encoding=UTF-8

# 占位符配置（可选）
flyway.placeholderPrefix=${
flyway.placeholderSuffix=}
flyway.placeholderReplacement=true
