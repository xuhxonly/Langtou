# ==========================================
# Langtou 社交内容社区 APP - Docker Compose 生产环境配置
# ==========================================
# 包含: MySQL 8.0 (主从), Redis Cluster (6节点), Zookeeper + Kafka,
#       Elasticsearch + Kibana, Nacos, 所有后端微服务, Python推荐服务,
#       Nginx, Prometheus + Grafana
# ==========================================

version: "3.9"

networks:
  langtou-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-master-data:
  mysql-slave-data:
  es-data:
  nacos-data:
  grafana-data:
  prometheus-data:
  kafka-data:
  zookeeper-data:
  nginx-data:

services:
  # ==========================================
  # MySQL 8.0 (主从架构)
  # ==========================================
  langtou-mysql:
    image: mysql:8.0
    container_name: langtou-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./scripts/mysql-master.cnf:/etc/mysql/conf.d/master.cnf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-do-db=${MYSQL_DATABASE}
      --binlog-do-db=nacos
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=512M

  langtou-mysql-slave:
    image: mysql:8.0
    container_name: langtou-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./scripts/mysql-slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.11
    depends_on:
      langtou-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=512M

  # ==========================================
  # Redis Cluster (6节点: 3主3从)
  # ==========================================
  langtou-redis-1:
    image: redis:7-alpine
    container_name: langtou-redis-1
    restart: always
    ports:
      - "6379:6379"
      - "16379:16379"
    volumes:
      - ./scripts/redis-cluster.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}

  langtou-redis-2:
    image: redis:7-alpine
    container_name: langtou-redis-2
    restart: always
    ports:
      - "6380:6380"
      - "16380:16380"
    volumes:
      - ./scripts/redis-cluster.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.21
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --port 6380 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}

  langtou-redis-3:
    image: redis:7-alpine
    container_name: langtou-redis-3
    restart: always
    ports:
      - "6381:6381"
      - "16381:16381"
    volumes:
      - ./scripts/redis-cluster.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.22
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --port 6381 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}

  langtou-redis-4:
    image: redis:7-alpine
    container_name: langtou-redis-4
    restart: always
    ports:
      - "6382:6382"
      - "16382:16382"
    volumes:
      - ./scripts/redis-cluster.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.23
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --port 6382 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}

  langtou-redis-5:
    image: redis:7-alpine
    container_name: langtou-redis-5
    restart: always
    ports:
      - "6383:6383"
      - "16383:16383"
    volumes:
      - ./scripts/redis-cluster.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.24
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --port 6383 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}

  langtou-redis-6:
    image: redis:7-alpine
    container_name: langtou-redis-6
    restart: always
    ports:
      - "6384:6384"
      - "16384:16384"
    volumes:
      - ./scripts/redis-cluster.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.25
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --port 6384 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}

  langtou-redis-cluster-init:
    image: redis:7-alpine
    container_name: langtou-redis-cluster-init
    restart: "no"
    depends_on:
      langtou-redis-1:
        condition: service_healthy
      langtou-redis-2:
        condition: service_healthy
      langtou-redis-3:
        condition: service_healthy
      langtou-redis-4:
        condition: service_healthy
      langtou-redis-5:
        condition: service_healthy
      langtou-redis-6:
        condition: service_healthy
    networks:
      - langtou-network
    entrypoint: >
      sh -c "
        echo 'Waiting for all Redis nodes to be ready...' &&
        sleep 3 &&
        redis-cli --cluster create
          172.20.0.20:6379
          172.20.0.21:6380
          172.20.0.22:6381
          172.20.0.23:6382
          172.20.0.24:6383
          172.20.0.25:6384
          --cluster-replicas 1
          --cluster-yes
          -a ${REDIS_PASSWORD}
      "

  # ==========================================
  # Zookeeper
  # ==========================================
  langtou-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: langtou-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.30
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Kafka
  # ==========================================
  langtou-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: langtou-kafka
    restart: always
    depends_on:
      langtou-zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.31
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Elasticsearch
  # ==========================================
  langtou-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: langtou-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - TZ=${TZ}
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q 'status'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==========================================
  # Kibana
  # ==========================================
  langtou-kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: langtou-kibana
    restart: always
    depends_on:
      langtou-elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://langtou-elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - TZ=${TZ}
    ports:
      - "5601:5601"
    networks:
      langtou-network:
        ipv4_address: 172.20.0.41
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # Nacos (注册中心/配置中心)
  # ==========================================
  langtou-nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: langtou-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: ip
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: langtou-mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      TZ: ${TZ}
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      langtou-network:
        ipv4_address: 172.20.0.50
    depends_on:
      langtou-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================
  # Nginx (反向代理/负载均衡)
  # ==========================================
  langtou-nginx:
    image: nginx:1.25-alpine
    container_name: langtou-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/h5.conf:/etc/nginx/conf.d/h5.conf:ro
      - nginx-data:/var/cache/nginx
    networks:
      langtou-network:
        ipv4_address: 172.20.0.70
    depends_on:
      langtou-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # 后端微服务
  # ==========================================
  langtou-gateway:
    image: ${DOCKER_REGISTRY:-registry.langtou.local}/${DOCKER_NAMESPACE:-langtou}/gateway:${IMAGE_TAG:-latest}
    container_name: langtou-gateway
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${GATEWAY_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-nacos:
        condition: service_started
      langtou-redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-user-service:
    image: ${DOCKER_REGISTRY:-registry.langtou.local}/${DOCKER_NAMESPACE:-langtou}/user-service:${IMAGE_TAG:-latest}
    container_name: langtou-user-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${USER_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-content-service:
    image: ${DOCKER_REGISTRY:-registry.langtou.local}/${DOCKER_NAMESPACE:-langtou}/content-service:${IMAGE_TAG:-latest}
    container_name: langtou-content-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ES_HOST=langtou-elasticsearch
      - ES_PORT=9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${CONTENT_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-elasticsearch:
        condition: service_healthy
      langtou-redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-interact-service:
    image: ${DOCKER_REGISTRY:-registry.langtou.local}/${DOCKER_NAMESPACE:-langtou}/interact-service:${IMAGE_TAG:-latest}
    container_name: langtou-interact-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka:9092
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${INTERACT_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-kafka:
        condition: service_healthy
      langtou-redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  langtou-message-service:
    image: ${DOCKER_REGISTRY:-registry.langtou.local}/${DOCKER_NAMESPACE:-langtou}/message-service:${IMAGE_TAG:-latest}
    container_name: langtou-message-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=langtou-nacos:8848
      - MYSQL_HOST=langtou-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=langtou-redis-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=langtou-kafka:9092
      - JVM_OPTS=${JVM_OPTS}
      - TZ=${TZ}
    ports:
      - "${MESSAGE_SERVICE_PORT}:8080"
    networks:
      - langtou-network
    depends_on:
      langtou-mysql:
        condition: service_healthy
      langtou-nacos:
        condition: service_healthy
      langtou-kafka:
        condition: service_healthy
      langtou-redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ==========================================
  # Python 推荐服务
  # ==========================================
  langtou-recommendation-service:
    image: ${DOCKER_REGISTRY:-registry.langtou.local}/${DOCKER_NAMESPACE:-langtou}/recommendation-service:${IMAGE_TAG:-latest}
    container_name: langtou-recommendation-service
    restart: always
    environment:
      - REDIS_HOST=langtou-redis-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ES_HOST=langtou-elasticsearch
      - ES_PORT=9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - TZ=${TZ}
    ports:
      - "${RECOMMENDATION_PORT:-8000}:8000"
    networks:
      - langtou-network
    depends_on:
      langtou-elasticsearch:
        condition: service_healthy
      langtou-redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ==========================================
  # Prometheus
  # ==========================================
  langtou-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: langtou-prometheus
    restart: always
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/rules/alert-rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      langtou-network:
        ipv4_address: 172.20.0.60
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Grafana
  # ==========================================
  langtou-grafana:
    image: grafana/grafana:10.2.0
    container_name: langtou-grafana
    restart: always
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - TZ=${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/langtou-dashboard.json:ro
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    networks:
      langtou-network:
        ipv4_address: 172.20.0.61
    depends_on:
      langtou-prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
