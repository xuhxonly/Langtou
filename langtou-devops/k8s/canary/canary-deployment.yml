# ==========================================
# Langtou User Service - Canary Deployment
# 金丝雀部署：10%流量路由到新版本
# ==========================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-canary
  namespace: langtou
  labels:
    app: user-service
    tier: backend
    track: canary
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-service
      track: canary
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
        track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      imagePullSecrets:
        - name: langtou-docker-registry
      containers:
        - name: user-service
          image: registry.langtou.local/langtou/user-service:canary
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: langtou-service-config
                  key: nacos-server-addr
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: langtou-service-config
                  key: mysql-host
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: langtou-service-config
                  key: mysql-port
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: langtou-service-config
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: langtou-db-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langtou-db-secret
                  key: mysql-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: langtou-service-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: langtou-service-config
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langtou-redis-secret
                  key: redis-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: langtou-jwt-secret
                  key: jwt-secret
            - name: JVM_OPTS
              value: "-Xms512m -Xmx1024m -XX:+UseG1GC"
            - name: TZ
              value: "Asia/Shanghai"
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: user-service-canary
  namespace: langtou
  labels:
    app: user-service
    track: canary
spec:
  type: ClusterIP
  selector:
    app: user-service
    track: canary
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
# Nginx Ingress - 稳定版本 (90%流量)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-service-stable-ingress
  namespace: langtou
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
    - hosts:
        - api.langtou.com
      secretName: langtou-tls
  rules:
    - host: api.langtou.com
      http:
        paths:
          - path: /api/user
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8080

---
# Nginx Ingress - 金丝雀版本 (10%流量)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-service-canary-ingress
  namespace: langtou
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  tls:
    - hosts:
        - api.langtou.com
      secretName: langtou-tls
  rules:
    - host: api.langtou.com
      http:
        paths:
          - path: /api/user
            pathType: Prefix
            backend:
              service:
                name: user-service-canary
                port:
                  number: 8080
