# ==========================================
# Langtou 社交内容社区 APP - ServiceAccount & RBAC
# ==========================================
# 为每个微服务创建独立ServiceAccount
# 配置最小权限RBAC
# ==========================================

---
# ==========================================
# 业务命名空间 ServiceAccount
# ==========================================

---
# Gateway ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-sa
  namespace: langtou
  labels:
    app: gateway
    tier: frontend
automountServiceAccountToken: false

---
# User Service ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service-sa
  namespace: langtou
  labels:
    app: user-service
    tier: backend
automountServiceAccountToken: false

---
# Content Service ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: content-service-sa
  namespace: langtou
  labels:
    app: content-service
    tier: backend
automountServiceAccountToken: false

---
# Interact Service ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: interact-service-sa
  namespace: langtou
  labels:
    app: interact-service
    tier: backend
automountServiceAccountToken: false

---
# Message Service ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: message-service-sa
  namespace: langtou
  labels:
    app: message-service
    tier: backend
automountServiceAccountToken: false

---
# ==========================================
# 基础设施命名空间 ServiceAccount
# ==========================================

---
# MySQL ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-sa
  namespace: langtou-infra
  labels:
    app: mysql
    tier: database
automountServiceAccountToken: false

---
# Redis ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: langtou-infra
  labels:
    app: redis-cluster
    tier: cache
automountServiceAccountToken: false

---
# Kafka ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-sa
  namespace: langtou-infra
  labels:
    app: kafka
    tier: messaging
automountServiceAccountToken: false

---
# Elasticsearch ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elasticsearch-sa
  namespace: langtou-infra
  labels:
    app: elasticsearch
    tier: search
automountServiceAccountToken: false

---
# ==========================================
# RBAC - 微服务最小权限 Role
# ==========================================

---
# 微服务通用 Role (读取ConfigMap和Secret)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: microservice-config-role
  namespace: langtou
  labels:
    app: langtou
    rbac: microservice
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - langtou-service-config
      - langtou-common-config
      - langtou-gateway-config
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - langtou-db-secret
      - langtou-redis-secret
      - langtou-es-secret
      - langtou-jwt-secret
      - langtou-nacos-secret

---
# Gateway 特殊 Role (需要读取Endpoints进行服务发现)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-role
  namespace: langtou
  labels:
    app: gateway
    rbac: microservice
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - langtou-service-config
      - langtou-common-config
      - langtou-gateway-config
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - langtou-db-secret
      - langtou-redis-secret
      - langtou-jwt-secret

---
# 微服务通用 RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-config-binding
  namespace: langtou
  labels:
    app: user-service
    rbac: microservice
subjects:
  - kind: ServiceAccount
    name: user-service-sa
    namespace: langtou
roleRef:
  kind: Role
  name: microservice-config-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: content-service-config-binding
  namespace: langtou
  labels:
    app: content-service
    rbac: microservice
subjects:
  - kind: ServiceAccount
    name: content-service-sa
    namespace: langtou
roleRef:
  kind: Role
  name: microservice-config-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: interact-service-config-binding
  namespace: langtou
  labels:
    app: interact-service
    rbac: microservice
subjects:
  - kind: ServiceAccount
    name: interact-service-sa
    namespace: langtou
roleRef:
  kind: Role
  name: microservice-config-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: message-service-config-binding
  namespace: langtou
  labels:
    app: message-service
    rbac: microservice
subjects:
  - kind: ServiceAccount
    name: message-service-sa
    namespace: langtou
roleRef:
  kind: Role
  name: microservice-config-role
  apiGroup: rbac.authorization.k8s.io

---
# Gateway RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-role-binding
  namespace: langtou
  labels:
    app: gateway
    rbac: microservice
subjects:
  - kind: ServiceAccount
    name: gateway-sa
    namespace: langtou
roleRef:
  kind: Role
  name: gateway-role
  apiGroup: rbac.authorization.k8s.io

---
# ==========================================
# RBAC - 基础设施命名空间 Role
# ==========================================

---
# 基础设施通用 Role (允许读取自身命名空间的ConfigMap和Secret)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-config-role
  namespace: langtou-infra
  labels:
    app: langtou
    rbac: infrastructure
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

---
# MySQL RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mysql-infra-binding
  namespace: langtou-infra
  labels:
    app: mysql
    rbac: infrastructure
subjects:
  - kind: ServiceAccount
    name: mysql-sa
    namespace: langtou-infra
roleRef:
  kind: Role
  name: infra-config-role
  apiGroup: rbac.authorization.k8s.io

---
# Redis RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-infra-binding
  namespace: langtou-infra
  labels:
    app: redis-cluster
    rbac: infrastructure
subjects:
  - kind: ServiceAccount
    name: redis-sa
    namespace: langtou-infra
roleRef:
  kind: Role
  name: infra-config-role
  apiGroup: rbac.authorization.k8s.io

---
# Kafka RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-infra-binding
  namespace: langtou-infra
  labels:
    app: kafka
    rbac: infrastructure
subjects:
  - kind: ServiceAccount
    name: kafka-sa
    namespace: langtou-infra
roleRef:
  kind: Role
  name: infra-config-role
  apiGroup: rbac.authorization.k8s.io

---
# Elasticsearch RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elasticsearch-infra-binding
  namespace: langtou-infra
  labels:
    app: elasticsearch
    rbac: infrastructure
subjects:
  - kind: ServiceAccount
    name: elasticsearch-sa
    namespace: langtou-infra
roleRef:
  kind: Role
  name: infra-config-role
  apiGroup: rbac.authorization.k8s.io

---
# ==========================================
# RBAC - 监控命名空间权限
# ==========================================

---
# Prometheus 监控 Role (允许跨命名空间读取Pod/Service信息)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: langtou-prometheus-monitoring
  labels:
    app: langtou
    rbac: monitoring
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
    resourceNames:
      - langtou-service-config

---
# Prometheus ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: langtou-prometheus-monitoring-binding
  labels:
    app: langtou
    rbac: monitoring
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: langtou-monitoring
roleRef:
  kind: ClusterRole
  name: langtou-prometheus-monitoring
  apiGroup: rbac.authorization.k8s.io

---
# ==========================================
# RBAC - CI/CD 部署权限
# ==========================================

---
# Jenkins/CI 部署 Role (允许在langtou命名空间部署应用)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cicd-deploy-role
  namespace: langtou
  labels:
    app: langtou
    rbac: cicd
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollback"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]

---
# Jenkins/CI RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cicd-deploy-binding
  namespace: langtou
  labels:
    app: langtou
    rbac: cicd
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: langtou
  - kind: ServiceAccount
    name: cicd
    namespace: langtou
roleRef:
  kind: Role
  name: cicd-deploy-role
  apiGroup: rbac.authorization.k8s.io

---
# ==========================================
# Security - PodSecurityPolicy / Pod Security Standards
# ==========================================

---
# 限制特权容器的 Pod Security Policy (适用于支持PSP的集群)
# 注: Kubernetes 1.25+ 请使用 Pod Security Admission 替代
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: langtou-restricted
  labels:
    app: langtou
    policy: security
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: false
