# ==========================================
# Langtou 社交内容社区 APP - Promtail 配置
# ==========================================
# Promtail 日志收集器配置
# 收集所有容器日志并发送到Loki
# ==========================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # ==========================================
  # Docker 容器日志收集
  # ==========================================
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - labels:
          stream:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: output

  # ==========================================
  # Langtou 微服务日志 (按服务分类)
  # ==========================================
  - job_name: langtou-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: langtou-services
          namespace: langtou
          __path__: /var/log/langtou/*/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}'
          max_wait_time: 3s
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\.\d+)\s+\[(?P<thread>[^\]]+)\]\s+(?P<level>\w+)\s+(?P<logger>\S+)\s+-\s+(?P<message>.*)$'
      - labels:
          level:
          thread:
          logger:
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000'
      - output:
          source: message

  # ==========================================
  # Nginx 访问日志
  # ==========================================
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - json:
          expressions:
            remote_addr: remote_addr
            status: status
            request: request
            request_time: request_time
      - labels:
          status:
          remote_addr:
      - timestamp:
          source: time
          format: RFC3339
      - output:
          source: request

  # ==========================================
  # Nginx 错误日志
  # ==========================================
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2}\s\d{2}:\d{2}:\d{2})\s+\[(?P<level>\w+)\]\s+(?P<pid>\d+)#\d+:\s+\*(?P<cid>\d+)\s+(?P<message>.*)$'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: '2006/01/02 15:04:05'
      - output:
          source: message

  # ==========================================
  # MySQL 慢查询日志
  # ==========================================
  - job_name: mysql-slow
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql
          log_type: slow-query
          __path__: /var/log/mysql/slow.log
    pipeline_stages:
      - multiline:
          firstline: '^# Time: |^# User@Host:'
          max_wait_time: 3s
      - regex:
          expression: '^#\s+Time:\s+(?P<timestamp>[^\n]+)'
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000000Z'

  # ==========================================
  # 系统日志
  # ==========================================
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<host>\S+)\s+(?P<service>\S+)\[(?P<pid>\d+)\]:\s+(?P<message>.*)$'
      - labels:
          service:
          host:
      - timestamp:
          source: timestamp
          format: 'Jan _2 15:04:05'
      - output:
          source: message
