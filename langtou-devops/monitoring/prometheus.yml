# ==========================================
# Langtou 社交内容社区 APP - Prometheus 配置
# ==========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: langtou
    replica: '{{.ExternalURL}}'

# 告警规则文件
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# 抓取配置
scrape_configs:
  # ==========================================
  # Prometheus自身监控
  # ==========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ==========================================
  # Langtou微服务 (通过Kubernetes发现)
  # ==========================================
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - langtou
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  # ==========================================
  # Langtou微服务 (Docker Compose环境)
  # ==========================================
  - job_name: 'langtou-services'
    static_configs:
      - targets:
          - gateway:8080
          - user-service:8080
          - content-service:8080
          - interact-service:8080
          - message-service:8080
        labels:
          group: 'langtou-backend'
    metrics_path: /actuator/prometheus

  # ==========================================
  # Nginx监控
  # ==========================================
  - job_name: 'nginx'
    static_configs:
      - targets:
          - nginx:9113
        labels:
          service: 'nginx'

  # ==========================================
  # MySQL监控 (mysqld_exporter)
  # ==========================================
  - job_name: 'mysql'
    static_configs:
      - targets:
          - mysql-exporter:9104
        labels:
          service: 'mysql'

  # ==========================================
  # Redis监控 (redis_exporter)
  # ==========================================
  - job_name: 'redis'
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: 'redis'

  # ==========================================
  # Kafka监控 (kafka_exporter)
  # ==========================================
  - job_name: 'kafka'
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          service: 'kafka'

  # ==========================================
  # Elasticsearch监控
  # ==========================================
  - job_name: 'elasticsearch'
    static_configs:
      - targets:
          - elasticsearch:9200
        labels:
          service: 'elasticsearch'
    metrics_path: /_prometheus/metrics

  # ==========================================
  # Node Exporter (主机监控)
  # ==========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: 'node'

  # ==========================================
  # Kubernetes节点监控
  # ==========================================
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  # ==========================================
  # Kubernetes服务监控
  # ==========================================
  - job_name: 'kubernetes-services'
    kubernetes_sd_configs:
      - role: service
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: kubernetes_service_name
