server:
  port: 8080

spring:
  application:
    name: langtou-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: langtou-user-service-admin
          uri: lb://langtou-user-service
          predicates:
            - Path=/api/v1/admin/auth/**, /api/v1/admin/users/**
          filters:
            - StripPrefix=2
          order: 1

        - id: langtou-content-service-admin
          uri: lb://langtou-content-service
          predicates:
            - Path=/api/v1/admin/notes/**, /api/v1/admin/analytics/**, /api/v1/admin/settings/**, /api/v1/admin/sensitive-words/**, /api/v1/admin/audit/**
          filters:
            - StripPrefix=2
          order: 2

        - id: langtou-user-service-auth
          uri: lb://langtou-user-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-user-service-users
          uri: lb://langtou-user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-content-service-notes
          uri: lb://langtou-content-service
          predicates:
            - Path=/api/v1/notes/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-content-service-tags
          uri: lb://langtou-content-service
          predicates:
            - Path=/api/v1/tags/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-content-service-search
          uri: lb://langtou-content-service
          predicates:
            - Path=/api/v1/search/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-creator-service
          uri: lb://langtou-creator-service
          predicates:
            - Path=/api/v1/creator/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-ad-service-ads
          uri: lb://langtou-ad-service
          predicates:
            - Path=/api/v1/ads/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-ad-service-recommend-positions
          uri: lb://langtou-ad-service
          predicates:
            - Path=/api/v1/recommend-positions/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-ai-service
          uri: lb://langtou-ai-service
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-game-service
          uri: lb://langtou-game-service
          predicates:
            - Path=/api/v1/game/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-quiz-service
          uri: lb://langtou-quiz-service
          predicates:
            - Path=/api/v1/quiz/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 500
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-content-service-upload
          uri: lb://langtou-content-service
          predicates:
            - Path=/api/v1/upload/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-interact-service-comments
          uri: lb://langtou-interact-service
          predicates:
            - Path=/api/v1/comments/**, /api/v1/notes/*/share-link, /api/v1/notes/*/report
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-content-service-analytics
          uri: lb://langtou-content-service
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=2

        - id: langtou-interact-service
          uri: lb://langtou-interact-service
          predicates:
            - Path=/api/v1/notes/**/like,/api/v1/notes/**/collect,/api/v1/notes/**/comments,/api/v1/users/me/collections
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 300
                redis-rate-limiter.burstCapacity: 600
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-message-service-messages
          uri: lb://langtou-message-service
          predicates:
            - Path=/api/v1/messages/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        - id: langtou-message-service-notifications
          uri: lb://langtou-message-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000,http://localhost:8080"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false

    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
      shutdown-timeout: 200ms

resilience4j:
  circuitbreaker:
    configs:
      default:
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 50
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      userServiceCB:
        baseConfig: default
      contentServiceCB:
        baseConfig: default
      interactServiceCB:
        baseConfig: default
      messageServiceCB:
        baseConfig: default
      searchServiceCB:
        baseConfig: default
      analyticsServiceCB:
        baseConfig: default
        failureRateThreshold: 80
        slowCallDurationThreshold: 5s

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    io.github.resilience4j: INFO

jwt:
  secret: ${JWT_SECRET:}