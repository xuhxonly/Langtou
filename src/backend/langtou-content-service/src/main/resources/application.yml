server:
  port: 8082

spring:
  application:
    name: langtou-content-service
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    url: jdbc:mysql://localhost:3306/langtou?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 3000
      leak-detection-threshold: 60000
      register-mbeans: true
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
      shutdown-timeout: 200ms
  elasticsearch:
    uris: ${ES_HOST:localhost:9200}
    connection-timeout: 3s
    socket-timeout: 5s
  data:
    elasticsearch:
      repositories:
        enabled: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP

langtou:
  upload:
    path: /data/uploads/langtou/
    url-prefix: /uploads/
  minio:
    endpoint: http://${MINIO_HOST:localhost}:${MINIO_PORT:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:langtou}
  ai:
    creation:
      enabled: true
      provider: ${AI_CREATION_PROVIDER:mock}
      api-key: ${AI_CREATION_API_KEY:}
      api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
      model: qwen-turbo
      rate-limit: 10
      cache-ttl: 3600

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.langtou.content.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

slow-query:
  enabled: true
  threshold: 500
  log-level: WARN

langtou:
  elasticsearch:
    refresh-interval: 5s
    bulk:
      batch-size: 1000
      flush-interval: 5s
    slowlog:
      query:
        threshold: 1s
        warn-threshold: 500ms
      fetch:
        threshold: 500ms
        warn-threshold: 200ms
      indexing:
        threshold: 500ms

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.langtou.content.mapper: debug
    com.langtou.common.monitor: WARN
